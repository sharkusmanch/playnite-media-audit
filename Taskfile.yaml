# https://taskfile.dev

version: '3'

tasks:
  all:
  - task: clean
  - task: format
  - task: build
  - task: pack
  - task: install

  build:
    cmds:
    - dotnet build MediaAudit.csproj --configuration Release

  format:
    cmds:
    - dotnet format MediaAudit.csproj

  pack:
    deps:
    - build
    cmds:
    - powershell cp -Recurse -Force bin/Release/net462/ .\dist\raw\
    - ~/AppData/Local/Playnite/Toolbox.exe pack bin/Release/net462/ dist

  clean:
    cmds:
    - powershell -command "Remove-Item -Force -Recurse .\dist -ErrorAction Ignore" || true
    - powershell -command "Remove-Item -Force -Recurse .\bin\ -ErrorAction Ignore" || true

  install:
    cmds:
    - powershell ./dist/*.pext

  logs:
    cmds:
    - powershell "Get-Content ~/Appdata/Roaming/Playnite/extensions.log" -Wait
